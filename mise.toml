[tasks.sync]
description = "Install dependencies from the committed lockfile."
run = "uv sync --locked"

[tasks.audit]
description = "Check Python dependencies for known vulnerabilities."
run = "uv run --locked pip-audit"

[tasks.check]
description = "Run repository checks."
depends = ["sync", "audit"]

[tasks.detect]
description = "Run the current still-image bubble detector. Pass args after --."
run = "uv run --locked detect-bubbles \"$@\""
